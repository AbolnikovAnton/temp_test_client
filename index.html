<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anton Abolnikov CoPilot</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div>
            <p class="sidebar-kicker">Workspace</p>
            <h2>Chats</h2>
          </div>
          <button id="newChatBtn" class="primary-action" type="button">
            + New
          </button>
        </div>
        <div id="chatList"></div>
        <div class="usage-stats" id="usageStats">
          Spent: $0.0000<br />
          Input: 0 tokens<br />
          Output: 0 tokens
        </div>
      </aside>

      <main class="chat-container">
        <header>
          <h1>Anton Abolnikov CoPilot</h1>
        </header>

        <div id="chatBox" class="chat-box"></div>
        <div id="typing" class="typing-indicator hidden">
          Assistant is typing...
        </div>

        <div class="input-container">
          <textarea
            id="userInput"
            maxlength="10000"
            placeholder="Write a message..."
          ></textarea>
          <div class="char-counter"><span id="charCount">0</span> / 10000</div>
          <button id="sendBtn" type="button">Send</button>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
